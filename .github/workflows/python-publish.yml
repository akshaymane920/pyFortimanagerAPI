# Upload to PyPI when a GitHub Release is published.
# Releases are created automatically when you push a version tag (see create-release-on-tag.yml).
# Requires repo secret PYFORTIMANAGERAPI_TOKEN (PyPI API token with upload scope for this project).
#
# If upload fails with HTTP 400: the version is usually already on PyPI (re-running the workflow
# or publishing the same version twice). Fix: confirm on https://pypi.org/project/pyFortiManagerAPI/
# — if the version exists, bump setup.py and tag a new release, or use PyPI "yank" only if the
# published files are wrong (you cannot replace files in place).

name: Upload Python Package

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYFORTIMANAGERAPI_TOKEN }}
